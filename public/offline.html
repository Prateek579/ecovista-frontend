<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoVista - Offline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0f1a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(16,185,129,0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .container { position: relative; z-index: 1; max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px;
      background: linear-gradient(135deg, #34d399, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 14px 28px; border-radius: 12px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; font-weight: 600; text-decoration: none;
      transition: all 0.3s ease; cursor: pointer; border: none; font-size: 1rem; }
    .btn:hover { box-shadow: 0 6px 25px rgba(16,185,129,0.3); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. EcoVista needs an active connection to sync your carbon footprint data.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
